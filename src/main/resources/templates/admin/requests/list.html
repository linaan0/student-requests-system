<!DOCTYPE html>
<html xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}" lang="en">
<head>
    <title>Студентски молби</title>
</head>
<body>
<div layout:fragment="content">
    <div class="container py-4">
        <h1 class="fw-light fs-1 pb-4 pt-2">Студентски молби</h1>

        <form method="get" th:action="@{/admin/requests}" class="row g-2 mb-3">

            <div class="col-auto">
                <label class="form-label">Тип</label>
                <select name="type" class="form-select">
                    <option value="">Сите</option>
                    <option th:each="t : ${requestTypes}"
                            th:value="${t}"
                            th:text="${t.displayName}"
                            th:selected="${selectedType != null and t == selectedType}">
                    </option>
                </select>
            </div>

            <div class="col-auto">
                <label class="form-label">Сесија на молба</label>
                <select name="sessionId" class="form-select">
                    <option value="">Сите</option>
                    <option th:each="s : ${sessions}"
                            th:value="${s.id}"
                            th:text="${s.requestType.displayName + ' - ' + (s.semester?.code ?: '')}"
                            th:selected="${param.sessionId != null and param.sessionId[0] == s.id.toString()}">
                    </option>
                </select>
            </div>

            <div class="col-auto">
                <label class="form-label">Одобрено</label>
                <select name="isApproved" class="form-select">
                    <option value="">Сите</option>
                    <option value="true" th:selected="${param.isApproved != null and param.isApproved[0] == 'true'}">
                        Да
                    </option>
                    <option value="false" th:selected="${param.isApproved != null and param.isApproved[0] == 'false'}">
                        Не
                    </option>
                </select>
            </div>

            <div class="col-auto">
                <label class="form-label">Спроведено</label>
                <select name="isProcessed" class="form-select">
                    <option value="">Сите</option>
                    <option value="true" th:selected="${param.isProcessed != null and param.isProcessed[0] == 'true'}">
                        Да
                    </option>
                    <option value="false" th:selected="${param.isProcessed != null and param.isProcessed[0] == 'false'}">
                        Не
                    </option>
                </select>
            </div>

            <div class="col-auto align-self-end">
                <button type="submit" class="btn btn-primary f">Филтер</button>
            </div>
        </form>

        <div th:if="${requests.isEmpty()}" class="text-center py-5">

            <i class="bi bi-inbox fs-1 text-secondary"></i>

            <h4 class="mt-3">Нема пронајдени молби</h4>

            <p class="text-muted">
                Во моментот нема молби што треба да бидат разгледани.
            </p>

        </div>

        <table th:if="${!requests.isEmpty()}" class="table table-bordered">
            <thead>
            <tr>
                <th>ID</th>
                <th>Студент</th>
                <th>Тип</th>
                <th>Одобрено</th>
                <th>Спроведено</th>
                <th>Опис</th>
                <th>Детали</th>
                <th>Брзи акции</th>
            </tr>
            </thead>

            <tbody>
            <tr th:each="r : ${requests.content}">
                <td th:text="${r.id}"></td>
                <td th:text="${r.student?.index}"></td>
                <td th:text="${r.requestSession?.requestType.displayName}"></td>
                <td th:text="${r.isApproved==true}? 'Да':'Не'"></td>
                <td th:text="${r.isProcessed != null and r.isProcessed==true}? 'Да':'Не'"></td>
                <td th:text="${r.description}"></td>

                <td>
                    <a th:href="@{'/admin/requests/' + ${r.requestSession.requestType} + '/' + ${r.id}}" >
                        Разгледај молба
                    </a>
                </td>
                <td>
                    <div th:if="${r.canBeApproved()==false}" class="d-flex gap-2 mb-2">
                        <div class="alert alert-primary py-0 px-0 mb-0 mt-2">
                            <i class="bi bi-clock-history me-2"></i>
                            Се чека одобрување од професорот.
                        </div>
                    </div>
                    <div th:if="${r.canBeApproved()}" class="d-flex gap-2 mb-2">
                        <form th:if="${r.isApproved == null}"
                              th:action="@{'/admin/requests/' + ${r.requestSession.requestType} + '/' + ${r.id} + '/approve'}"
                              method="post">
                            <input type="hidden" name="redirectUrl"
                                   th:value="@{/admin/requests(
                                                     page=${currentPage},
                                                     type=${selectedType},
                                                     isApproved=${param.isApproved},
                                                     isProcessed=${param.isProcessed},
                                                     sessionId=${param.sessionId}
                                                   )}">
                            <button type="submit" class="btn btn-success">Одобри</button>
                        </form>
                        <form th:if="${r.isApproved == true and r.isProcessed ==null}"
                              th:action="@{'/admin/requests/' + ${r.requestSession.requestType} + '/' + ${r.id} + '/mark-as-processed'}"
                              method="post">

                            <input type="hidden" name="redirectUrl"
                                   th:value="@{/admin/requests(
                page=${currentPage},
                type=${selectedType},
                isApproved=${param.isApproved},
                isProcessed=${param.isProcessed},
                sessionId=${param.sessionId}
           )}">

                            <button type="submit" class="btn btn-success">
                                Спроведено
                            </button>
                        </form>

                        <form th:if="${r.isApproved!=false and (r.isProcessed !=true or r.isApproved==true and r.isProcessed == false )}"
                              th:action="@{'/admin/requests/' + ${r.requestSession.requestType} + '/' + ${r.id} + '/reject'}"
                              method="post" class="d-flex gap-2">
                            <input type="hidden" name="redirectUrl"
                                   th:value="@{/admin/requests(
            page=${currentPage},
            type=${selectedType},
            isApproved=${param.isApproved},
            isProcessed=${param.isProcessed},
            sessionId=${param.sessionId}
       )}">
                            <button type="submit" class="btn btn-danger">Одбиј</button>
                            <input type="text" name="reason" placeholder="Причина за одбивање" class="form-control"
                                   required/>

                        </form>
                    </div>
                    <p th:if="${ r.isProcessed != null and r.isProcessed == true or r.isApproved==false}" class="text-success">
                        Обработено
                    </p>

                </td>
            </tr>
            </tbody>
        </table>
<div th:if="${!requests.isEmpty()}">
        <div
             th:replace="~{fragments/paging :: pageSection(${requests})}">
        </div>
    </div>
</div>
</div>
</body>
</html>

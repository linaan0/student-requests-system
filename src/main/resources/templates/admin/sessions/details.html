<!DOCTYPE html>
<html xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}" lang="en">
<head>
    <title>Детали за сесијата за молба</title>
</head>
<body>
<div layout:fragment="content" class="container py-4">
    <h1 class="fw-light fs-1 pb-4 pt-2">Детали за сесијата за молба</h1>

    <p><b>ID:</b> <span th:text="${s.id}"></span></p>
    <p><b>Тип:</b> <span th:text="${s.requestType.displayName}"></span></p>
    <p><b>Семестар:</b> <span th:text="${s.semester?.code}"></span></p>
    <p><b>Активна од:</b> <span th:text="${s.timeFrom}"></span></p>
    <p><b>Активна до:</b> <span th:text="${s.timeTo}"></span></p>
    <p><b>Опис:</b> <span th:text="${!s.description.isBlank()}?${s.description}:'Нема опис'"></span></p>
    <p><b>Забелешка за одобрување:</b> <span th:text="${!s.approvalNote.isBlank()}?${s.approvalNote}:'Нема забелешка'"></span></p>

    <a th:href="@{/admin/sessions}" class="btn btn-secondary">Назад</a>
    <a th:href="@{'/admin/sessions/' + ${s.id} + '/edit'}" class="btn btn-primary mx-2">Уреди</a>
</div>
</body>
</html>

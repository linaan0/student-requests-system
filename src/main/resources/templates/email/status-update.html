<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<div style="font-family: Arial, sans-serif; max-width: 600px; margin: 0 auto; padding: 20px;">
    <h2>Статусот на вашата молба е ажуриран</h2>

    <p>Почитуван/а <span th:text="${studentName}"></span>,</p>

    <p>
        Статусот на вашата <b th:text="${requestType}"></b> е променет на:
        <b th:text="${status}"></b>.
    </p>

    <p th:if="${rejectionReason != null and !rejectionReason.isEmpty()}">
        <b>Причина:</b> <span th:text="${rejectionReason}"></span>
    </p>

    <p>За повеќе детали, проверете во системот за молби.</p>

    <hr style="border: none; border-top: 1px solid #ddd; margin: 20px 0;"/>
    <p style="font-size: 12px; color: #888;">ФИНКИ — Систем за молби</p>
</div>
</body>
</html>

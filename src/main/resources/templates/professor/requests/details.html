<!DOCTYPE html>
<html xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}" lang="en">
<head>
    <title>Детали за молбата</title>
</head>

<body>
<div layout:fragment="content" class="container py-4">

    <h1 class="fw-light fs-1 pb-4 pt-2">Детали за молбата</h1>

    <div th:if="${param.error}" class="alert alert-danger"
         th:text="${param.error}"></div>

    <p><b>ID:</b> <span th:text="${request.id}"></span></p>

    <p><b>Тип:</b> <span>Молба за задоцнето запишување на предмет</span></p>

    <p><b>Студент:</b> <span th:text="${request.student?.index}"></span></p>

    <p><b>Датум:</b> <span th:text="${request.dateCreated}"></span></p>

    <p><b>Опис:</b>
        <span th:text="${request.description != null ? request.description : 'Нема опис'}"></span>
    </p>
    <p><b>Предмет:</b> <span th:text="${request.joinedSubject?.name}"></span></p>
    <p><b>Професор:</b> <span th:text="${request.professor?.name}"></span></p>
    <p><b>Одобрено од професор:</b>
        <span th:text="${request.professorApproved !=null and request.professorApproved == true ? 'Да' :  'Не'}"></span>
    </p>





<p><b>Обработено од професор:</b>
    <span th:text="${request.professorApproved !=null ? 'Да' : 'Не'}"></span>
</p>

<div th:if="${request.isApproved == false}">
    <p><b>Причина за одбивање:</b>
        <span th:text="${request.rejectionReason}"></span>
    </p>
</div>

<hr/>

<div class="d-flex gap-2">

    <form th:if="${request.professorApproved== null}"
          th:action="@{'/professor/requests/late-enrollment/' + ${request.id} + '/approve'}"
          method="post">

        <input type="hidden" name="redirectUrl"
               th:value="@{'/professor/requests/late-enrollment/' + ${request.id}}">

        <button class="btn btn-success">Одобри</button>
    </form>

    <form th:if="${request.isApproved==null && (request.professorApproved == null || request.professorApproved==true)}"
          th:action="@{'/professor/requests/late-enrollment/' + ${request.id} + '/reject'}"
          method="post"
          class="d-flex gap-2">

        <input type="text" name="reason"
               class="form-control"
               placeholder="Причина"
               required>

        <input type="hidden" name="redirectUrl"
               th:value="@{'/professor/requests/late-enrollment/' + ${request.id}}">

        <button class="btn btn-danger">Одбиј</button>
    </form>

</div>

<a th:href="@{/professor/requests/late-enrollment}"
   class="btn btn-secondary mt-3">
    Назад
</a>

</div>
</body>
</html>

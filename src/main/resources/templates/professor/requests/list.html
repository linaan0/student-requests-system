<!DOCTYPE html>
<html xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}" lang="en">
<head>
    <title>Студентски молби</title>
</head>

<body>
<div layout:fragment="content">
    <div class="container py-4">

        <h1 class="fw-light fs-1 pb-4 pt-2">Студентски молби</h1>

        <form method="get"
              th:action="@{/professor/requests/late-enrollment}"
              class="row g-2 mb-3">

            <div class="col-auto">
                <label class="form-label">Сесија</label>
                <select name="sessionId" class="form-select">
                    <option value="">Сите</option>
                    <option th:each="s : ${sessions}"
                            th:value="${s.id}"
                            th:text="${s.requestType.displayName}"
                            th:selected="${param.sessionId != null and param.sessionId[0] == s.id.toString()}">
                    </option>
                </select>
            </div>

            <div class="col-auto">
                <label class="form-label">Одобрено</label>
                <select name="isApproved" class="form-select">
                    <option value="">Сите</option>
                    <option value="true">Да</option>
                    <option value="false">Не</option>
                </select>
            </div>

            <div class="col-auto">
                <label class="form-label">Спроведено</label>
                <select name="isProcessed" class="form-select">
                    <option value="">Сите</option>
                    <option value="true">Да</option>
                    <option value="false">Не</option>
                </select>
            </div>

            <div class="col-auto align-self-end">
                <button type="submit" class="btn btn-primary f">Филтер</button>
            </div>
        </form>

        <div th:if="${requests.isEmpty()}" class="text-center py-5">

            <i class="bi bi-inbox fs-1 text-secondary"></i>

            <h4 class="mt-3">Нема пронајдени молби</h4>

            <p class="text-muted">
                Во моментот нема молби што треба да бидат разгледани.
                <!--                Во моментот нема молби што одговараат на избраните филтри.-->
            </p>

        </div>

        <table th:if="${!requests.isEmpty()}" class="table table-bordered">
            <thead>
            <tr>
                <th>ID</th>
                <th>Студент</th>
                <th>Тип</th>
                <th>Одобрено</th>
                <th>Спроведено</th>
                <th>Опис</th>
                <th>Детали</th>
                <th>Акции</th>
            </tr>
            </thead>

            <tbody>
            <tr th:each="r : ${requests.content}">
                <td th:text="${r.id}"></td>
                <td th:text="${r.student?.index}"></td>
                <td th:text="${r.requestSession?.requestType.displayName}"></td>
                <td th:text="${r.isApproved == true ? 'Да' : 'Не'}"></td>
                <td th:text="${r.isProcessed == true ? 'Да' : 'Не'}"></td>
                <td th:text="${r.description}"></td>

                <td>
                    <a th:href="@{'/professor/requests/late-enrollment/' + ${r.id}}">
                        Детали
                    </a>
                </td>

                <td class="d-flex gap-2">

                    <form th:if="${r.professorApproved == null}"
                          th:action="@{'/professor/requests/late-enrollment/' + ${r.id} + '/approve'}"
                          method="post">

                        <input type="hidden" name="redirectUrl"
                               th:value="@{/professor/requests/late-enrollment(
                                   page=${currentPage},
                                   type=${selectedType},
                                   isApproved=${param.isApproved},
                                   isProcessed=${param.isProcessed},
                                   sessionId=${param.sessionId}
                               )}">

                        <button class="btn btn-success btn-sm">Одобри</button>
                    </form>

                    <form th:if="${r.isApproved==null && (r.professorApproved == null || r.professorApproved==true)}"
                          th:action="@{'/professor/requests/late-enrollment/' + ${r.id} + '/reject'}"
                          method="post" class="d-flex gap-2">

                        <input type="text" name="reason"
                               class="form-control form-control-sm"
                               placeholder="Причина"
                               required>

                        <input type="hidden" name="redirectUrl"
                               th:value="@{/professor/requests/late-enrollment(
                                   page=${currentPage},
                                   type=${selectedType},
                                   isApproved=${param.isApproved},
                                   isProcessed=${param.isProcessed},
                                   sessionId=${param.sessionId}
                               )}">

                        <button class="btn btn-danger btn-sm">Одбиј</button>
                    </form>
                    <p th:if="${ r.professorApproved != null and r.professorApproved  == false or r.isApproved==false}"
                       class="text-success">
                        Обработено
                    </p>

                </td>
            </tr>
            </tbody>
        </table>
        <div th:if="${!requests.isEmpty()}">
            <div th:replace="~{fragments/paging :: pageSection(${requests})}"></div>
        </div>
    </div>
</div>
</body>
</html>

<!DOCTYPE html>
<html xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}" lang="en">
<head>
    <title>Молба за промена на студиска програма</title>
</head>
<body>
<div layout:fragment="content" class="container py-4">
    <h1 class="fw-light fs-1 pb-4 pt-2">Молба за промена на студиска програма</h1>

    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <form th:action="@{/requests/change-program}" method="post" th:object="${form}">

        <input type="hidden" th:field="*{sessionId}" />
        <input type="hidden" th:field="*{oldProgramId}" />

        <p th:text="${session.description}"></p>

        <p>
            Тековна студиска програма:
            <b th:text="${currentProgram.name}"></b>
        </p>

        <div class="mb-3">
            <label class="form-label">Нова студиска програма</label>
            <select class="form-select" th:field="*{newProgramId}">
                <option th:each="p : ${studyPrograms}"
                        th:value="${p.code}"
                        th:text="${p.name}">
                </option>
            </select>
        </div>

        <div class="mb-3">
            <label class="form-label">Опис</label>
            <textarea class="form-control" th:field="*{description}"></textarea>
        </div>
        <div class="form-text mb-3" role="alert">
            <i class="bi bi-info-circle-fill me-2 "></i>
            При промена на статусот на молбата ќе добиете е-mail известување.
        </div>
        <button type="submit" class="btn btn-primary pe-3">Поднеси молба</button>
        <a th:href="@{/requests}" class="btn btn-secondary">Откажи</a>
    </form>

</div>
</body>
</html>

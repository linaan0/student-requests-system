<!DOCTYPE html>
<html xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}" lang="en">
<head>
    <title>Мои барања</title>
</head>
<body>
<div layout:fragment="content" class="container py-4">
    <h1 class="fw-light fs-1 pb-4 pt-2">Мои молби</h1>

    <a th:if="${!requests.isEmpty()}"  th:href="@{/requests/new}" class="btn btn-primary mb-3">+ Поднеси молба</a>

    <div th:if="${requests.isEmpty()}" class="text-center py-5">
        <i class="bi bi-file-earmark-text fs-1 text-secondary"></i>

        <h4 class="mt-3">Немате поднесено молби</h4>

        <p class="text-muted">
            Кога ќе поднесете нова молба, таа ќе се појави овде.
        </p>

        <a th:href="@{/requests/new}" class="btn btn-primary">
            + Поднеси молба
        </a>
    </div>
    <table th:if="${!requests.isEmpty()}" class="table table-bordered table-hover">
        <thead>
        <tr>
            <th>Датум</th>
            <th>Тип</th>
            <th>Опис</th>
            <th>Статус</th>
            <th>Детали</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="r : ${requests}"
            th:onclick="|window.location.href='@{${r.detailsUrl}}'|"
            style="cursor: pointer;">
            <td th:text="${r.dateCreated}"></td>
            <td th:text="${r.type.displayName}"></td>

            <td th:if="${!r.description.isBlank()}" th:text="${r.description}"></td>
            <td th:if="${r.description.isBlank()}"  class="text-secondary">Нема опис</td>
            <td>
                <span th:if="${r.isApproved==null}" class="badge bg-secondary">Во обработка</span>
                <span th:if="${r.isApproved!=null and r.isApproved==true and r.isProcessed==null}" class="badge bg-success">Одобрено</span>
                <span th:if="${r.isProcessed!=null and r.isProcessed}" class="badge bg-success">Одобрено, спроведено</span>
                    <span th:if="${r.isApproved!=null and r.isApproved==false}" class="badge bg-danger">Одбиено</span>


            </td>
            <td>
                <a th:href="${r.detailsUrl}">Детали</a>
            </td>
        </tr>
        </tbody>
    </table>

</div>
</body>
</html>

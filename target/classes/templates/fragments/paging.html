<div th:fragment="pageSection(page)" class="custom-pagination" >
    <div class="row">
        <div class="col-8">
            <nav aria-label="Page navigation">
                <ul class="pagination">
                    <li class="cursor-pointer page-item" th:class="${page.isFirst()} ? 'disabled' : ''">
                        <a class="page-link" href="#" onClick="updateQueryStringParameter('page', 0)">Прва</a>
                    </li>
                    <li class="page-item" th:class="${page.hasPrevious()} ? '': 'disabled'">
                        <a class="page-link" href="#"
                           onClick="updateQueryStringParameter('page', this.getAttribute('page-number'))"
                           th:page-number="${page.number - 1}">Претходна</a>
                    </li>
                    <li th:each="pageNum : ${#numbers.sequence(T(java.lang.Math).max(1,page.number-4), (page.totalPages == 0? 1: T(java.lang.Math).min(page.totalPages,page.number+6)))}"
                        th:class="${page.number+1 == pageNum} ? 'page-item active' : 'page-item'">
                        <a class="page-link" href="#"
                           onClick="updateQueryStringParameter('page', this.getAttribute('page-number'))"
                           th:page-number="${pageNum - 1}" th:text="${pageNum}"></a>
                    </li>
                    <li class="page-item" th:class="${page.hasNext()} ? '': 'disabled'">
                        <a class="page-link" href="#"
                           onClick="updateQueryStringParameter('page', this.getAttribute('page-number'))"
                           th:page-number="${page.number + 1}">Следна</a>
                    </li>
                    <li class="page-item" th:class="${page.isLast()} ? 'disabled' : ''">
                        <a class="page-link" href="#"
                           onClick="updateQueryStringParameter('page', this.getAttribute('page-number'))"
                           th:page-number="${page.totalPages - 1}">Последна</a>
                    </li>
                </ul>
            </nav>
        </div>

        <div class="col-4">
            <div class="d-flex align-items-center mb-3">
                <label for="results" class="mr-2 mb-0">Резултати на страна: </label>

                <select id="results" class="form-control custom-select" style="max-width: 100px;"
                        onchange="updateQueryStringParameter('size', this.value)">
                    <option value="5" th:selected="${page.size == 5}">5</option>
                    <option value="10" th:selected="${page.size == 10}">10</option>
                    <option value="50" th:selected="${page.size == 50}">50</option>
                    <option value="100" th:selected="${page.size == 100}">100</option>
                    <option value="1000" th:selected="${page.size == 1000}">1000</option>
                </select>
                <span class="ms-1 me-1"> / Вкупно: </span>
                <b class="ms-1" th:text="${page.totalElements}"></b>
            </div>
        </div>
    </div>
</div>

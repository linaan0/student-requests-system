<th th:fragment="tableSort(name, label, params)">
    <span class="float-end">
        <i class="bi bi-sort-up d-block"
           style="cursor: pointer"
           th:sort-name="${name}"
           onClick="updateQueryStringParameter('sort', this.getAttribute('sort-name') + ' asc')">
        </i>

        <i class="bi bi-sort-down d-block"
           style="cursor: pointer"
           th:sort-name="${name}"
           onClick="updateQueryStringParameter('sort', this.getAttribute('sort-name') + ' desc')">
        </i>
    </span>
    <span th:text="${label}"></span>
</th>

<!DOCTYPE html>
<html xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}" lang="en">
<head>
    <title>Молба за плаќање на рати</title>
</head>
<body>
<div layout:fragment="content" class="container py-4">
    <h1 class="fw-light fs-1 pb-4 pt-2">Молба за плаќање на рати</h1>

    <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

    <form th:action="@{/requests/installment}" method="post" th:object="${form}">

        <input type="hidden" th:field="*{sessionId}" th:value="${session.id}"/>

        <p th:text="${session.description}"></p>

        <div class="mb-3">
            <label class="form-label">Опис:</label>
            <textarea class="form-control" th:field="*{description}"></textarea>
        </div>

        <div class="mb-3">
            <label class="form-label">Број на рати:</label>
            <input type="number" class="form-control" th:field="*{installmentsNum}"/>
        </div>
        <div class="form-text mb-3" role="alert">
            <i class="bi bi-info-circle-fill me-2 "></i>
            При промена на статусот на молбата ќе добиете е-mail известување.
        </div>
        <button type="submit" class="btn btn-primary">Поднеси молба</button>
        <a th:href="@{/requests}" class="btn btn-secondary">Откажи</a>
    </form>

</div>
</body>
</html>
